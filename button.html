<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vivace — Video Background Hero</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ============================================================
   VIVACE — NAV + YOUTUBE VIDEO BACKGROUND HERO + LIGHTBOX
   • The Riverside Ambience video plays muted as the hero bg
   • Clicking anywhere on the hero opens it full, with sound,
     in a floating lightbox
   ============================================================ */

:root{
  --vv-cream:  #FAF6EF;
  --vv-ivory:  #F6EFE4;
  --vv-espresso:#221A16;
  --vv-gold:   #C9A227;
  --vv-gold-soft:#E3C56B;
  --vv-terracotta:#C4714B;

  --vv-display:'Playfair Display', serif;
  --vv-body:'Jost', sans-serif;
}

*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{ background:var(--vv-cream); font-family:var(--vv-body); }
ul{ list-style:none; }
a{ text-decoration:none; }

/* ============================================================
   HEADER / NAVIGATION
   Sits on top of the hero. It's a sibling of the hero, so
   clicking it never triggers the video lightbox.
   ============================================================ */
.vv-header{
  position:absolute;
  top:0; left:0; right:0;
  z-index:50;
  background:linear-gradient(180deg, rgba(20,14,11,0.72), rgba(20,14,11,0.28) 80%, transparent);
}

/* --- top strip: welcome, socials, phone --- */
.vv-topbar{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  padding:10px 24px;
  font-size:0.8rem;
  font-weight:300;
  letter-spacing:0.08em;
  color:rgba(246,239,228,0.85);
  border-bottom:1px solid rgba(246,239,228,0.14);
}
.vv-topbar .sep{ opacity:0.4; }
.vv-topbar__social{
  display:flex;
  gap:14px;
}
.vv-topbar__social a{
  color:rgba(246,239,228,0.85);
  display:grid; place-items:center;
  transition:color .25s ease, transform .25s ease;
}
.vv-topbar__social a:hover{ color:var(--vv-gold-soft); transform:translateY(-1px); }
.vv-topbar__call{ color:rgba(246,239,228,0.85); }
.vv-topbar__call:hover{ color:var(--vv-gold-soft); }

/* --- main nav row --- */
.vv-nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
  padding:14px clamp(20px, 4vw, 48px);
  max-width:1360px;
  margin-inline:auto;
}

/* logo — swap this block for your <img> logo asset */
.vv-nav__logo{
  display:flex;
  flex-direction:column;
  line-height:1;
  color:var(--vv-ivory);
}
.vv-nav__logo .mark{
  font-family:var(--vv-display);
  font-style:italic;
  font-size:1.7rem;
  color:var(--vv-gold-soft);
}
.vv-nav__logo .name{
  font-family:var(--vv-body);
  font-weight:400;
  font-size:1.05rem;
  letter-spacing:0.42em;
  margin-top:4px;
}
.vv-nav__logo .tag{
  font-size:0.5rem;
  font-weight:300;
  letter-spacing:0.28em;
  color:var(--vv-gold-soft);
  margin-top:4px;
  text-transform:uppercase;
}

.vv-nav__links{
  display:flex;
  align-items:center;
  gap:clamp(16px, 2.4vw, 34px);
}
.vv-nav__links a{
  position:relative;
  font-weight:300;
  font-size:0.92rem;
  letter-spacing:0.04em;
  color:var(--vv-ivory);
  padding:6px 0;
  transition:color .25s ease;
}
.vv-nav__links a::after{
  content:"";
  position:absolute;
  left:0; bottom:0;
  width:0; height:1.5px;
  background:var(--vv-gold);
  transition:width .3s cubic-bezier(.2,.8,.2,1);
}
.vv-nav__links a:hover,
.vv-nav__links a.is-active{ color:var(--vv-gold-soft); }
.vv-nav__links a:hover::after,
.vv-nav__links a.is-active::after{ width:100%; }

.vv-nav__book{
  font-weight:400;
  font-size:0.9rem;
  letter-spacing:0.08em;
  color:var(--vv-gold-soft);
  border:1px solid var(--vv-gold);
  padding:12px 28px;
  background:rgba(20,14,11,0.35);
  transition:background .3s ease, color .3s ease, transform .3s ease;
}
.vv-nav__book:hover{
  background:var(--vv-gold);
  color:var(--vv-espresso);
  transform:translateY(-2px);
}

/* --- mobile menu --- */
.vv-nav__toggle{
  display:none;
  background:none;
  border:0;
  cursor:pointer;
  width:42px; height:42px;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.vv-nav__toggle span{
  width:24px; height:2px;
  background:var(--vv-ivory);
  transition:transform .3s ease, opacity .3s ease;
}
.vv-nav__toggle[aria-expanded="true"] span:nth-child(1){ transform:translateY(8px) rotate(45deg); }
.vv-nav__toggle[aria-expanded="true"] span:nth-child(2){ opacity:0; }
.vv-nav__toggle[aria-expanded="true"] span:nth-child(3){ transform:translateY(-8px) rotate(-45deg); }

@media (max-width: 960px){
  .vv-topbar{ font-size:0.72rem; gap:10px; flex-wrap:wrap; }
  .vv-nav__toggle{ display:flex; }
  .vv-nav__links{
    position:absolute;
    top:100%; left:0; right:0;
    flex-direction:column;
    align-items:stretch;
    gap:0;
    background:rgba(24,17,13,0.97);
    backdrop-filter:blur(8px);
    max-height:0;
    overflow:hidden;
    transition:max-height .4s cubic-bezier(.2,.8,.2,1);
  }
  .vv-nav__links.is-open{ max-height:70vh; }
  .vv-nav__links a{
    padding:16px 28px;
    border-bottom:1px solid rgba(246,239,228,0.08);
  }
  .vv-nav__links a::after{ display:none; }
  .vv-nav__book{ display:none; }
}

/* ============================================================
   HERO — YouTube video background
   ============================================================ */
.vv-hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  cursor:pointer;
  overflow:hidden;
  isolation:isolate;
}

/* poster image shows while the video loads / if it can't play */
.vv-hero__poster{
  position:absolute; inset:0;
  z-index:-3;
  background:
    url('https://images.unsplash.com/photo-1600334129128-685c5582fd35?q=80&w=1800&auto=format&fit=crop')
    center/cover no-repeat;             /* ← swap for a still from the video */
}

/* the video background itself.
   The iframe is oversized so a 16:9 video always covers the
   hero, whatever the screen shape (like object-fit: cover). */
.vv-hero__video{
  position:absolute; inset:0;
  z-index:-2;
  overflow:hidden;
  pointer-events:none;    /* clicks pass through to the hero */
}
.vv-hero__video iframe{
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%, -50%);
  width:max(100vw, 177.78vh);   /* 16/9 × height  */
  height:max(100vh, 56.25vw);   /* 9/16 × width   */
  border:0;
  pointer-events:none;
}

/* warm dark overlay for text legibility */
.vv-hero::before{
  content:"";
  position:absolute; inset:0;
  z-index:-1;
  background:linear-gradient(180deg,
    rgba(24,17,13,0.74) 0%,
    rgba(24,17,13,0.5) 45%,
    rgba(24,17,13,0.66) 100%);
}

.vv-hero__wave{
  position:absolute;
  left:0; right:0; bottom:-1px;
  width:100%;
  height:110px;
  pointer-events:none;
}

.vv-hero__content{
  position:relative;
  padding:170px 24px 180px;
  max-width:840px;
}

.vv-hero__title{
  font-family:var(--vv-display);
  font-weight:400;
  font-size:clamp(2.6rem, 6.5vw, 4.6rem);
  line-height:1.15;
  color:var(--vv-ivory);
  margin-bottom:22px;
  text-shadow:0 2px 24px rgba(0,0,0,0.4);
}

.vv-hero__sub{
  font-weight:300;
  font-size:clamp(1rem, 1.6vw, 1.15rem);
  color:rgba(246,239,228,0.92);
  margin-bottom:36px;
}

.vv-hero__actions{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:28px;
  flex-wrap:wrap;
}

.vv-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-weight:400;
  font-size:0.95rem;
  padding:14px 30px;
  border-radius:999px;
  transition:transform .3s ease, box-shadow .3s ease;
}
.vv-btn--solid{
  background:var(--vv-terracotta);
  color:#fff;
  box-shadow:0 10px 26px rgba(196,113,75,0.35);
}
.vv-btn--solid:hover{ transform:translateY(-2px); box-shadow:0 14px 32px rgba(196,113,75,0.45); }
.vv-btn--ghost{
  color:var(--vv-ivory);
  text-decoration:underline;
  text-underline-offset:6px;
}
.vv-btn:focus-visible{ outline:3px solid var(--vv-gold-soft); outline-offset:3px; }

/* pulsing "watch with sound" badge */
.vv-hero__watch{
  position:absolute;
  left:50%;
  bottom:135px;
  transform:translateX(-50%);
  display:inline-flex;
  align-items:center;
  gap:12px;
  font-size:0.8rem;
  font-weight:400;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--vv-ivory);
  pointer-events:none;
  white-space:nowrap;
}
.vv-hero__watch .play{
  width:50px; height:50px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:rgba(246,239,228,0.14);
  border:1px solid rgba(246,239,228,0.5);
  backdrop-filter:blur(4px);
  position:relative;
}
.vv-hero__watch .play::before{
  content:"";
  position:absolute; inset:0;
  border-radius:50%;
  border:1px solid rgba(246,239,228,0.45);
  animation:vv-pulse 2.4s ease-out infinite;
}
.vv-hero__watch .play svg{ margin-left:3px; }

@keyframes vv-pulse{
  0%   { transform:scale(1);   opacity:0.9; }
  100% { transform:scale(1.9); opacity:0; }
}

/* ============================================================
   FLOATING YOUTUBE LIGHTBOX (with sound)
   ============================================================ */
.vv-lightbox{
  position:fixed;
  inset:0;
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:rgba(15,10,8,0.88);
  backdrop-filter:blur(6px);
  opacity:0;
  visibility:hidden;
  transition:opacity .35s ease, visibility .35s ease;
}
.vv-lightbox.is-open{ opacity:1; visibility:visible; }

.vv-lightbox__frame{
  position:relative;
  width:min(1100px, 92vw);
  aspect-ratio:16/9;
  border-radius:18px;
  overflow:hidden;
  background:#000;
  box-shadow:0 40px 100px rgba(0,0,0,0.6);
  transform:scale(0.94) translateY(14px);
  transition:transform .4s cubic-bezier(.2,.8,.2,1);
}
.vv-lightbox.is-open .vv-lightbox__frame{ transform:scale(1) translateY(0); }
.vv-lightbox__frame iframe{
  position:absolute; inset:0;
  width:100%; height:100%;
  border:0;
}

.vv-lightbox__close{
  position:absolute;
  top:-18px; right:-18px;
  width:44px; height:44px;
  border-radius:50%;
  border:0;
  cursor:pointer;
  display:grid;
  place-items:center;
  background:var(--vv-gold);
  color:var(--vv-espresso);
  font-size:1.1rem;
  box-shadow:0 8px 22px rgba(0,0,0,0.4);
  transition:transform .25s ease, background .25s ease;
  z-index:2;
}
.vv-lightbox__close:hover{ transform:rotate(90deg); background:var(--vv-gold-soft); }
.vv-lightbox__close:focus-visible{ outline:3px solid var(--vv-ivory); outline-offset:2px; }

@media (max-width:640px){
  .vv-hero__watch{ bottom:115px; font-size:0.7rem; }
  .vv-lightbox__close{ top:10px; right:10px; }
}

@media (prefers-reduced-motion: reduce){
  .vv-lightbox, .vv-lightbox__frame, .vv-btn,
  .vv-lightbox__close, .vv-nav__links{ transition:none; }
  .vv-hero__watch .play::before{ animation:none; }
}
</style>
</head>

    <iframe id="vvLightboxIframe"
            src=""

<script>
(function(){
  const YT_VIDEO_ID = "_YWYNuqIxbw";

  /* ---------- mobile nav ---------- */
  const navToggle = document.getElementById('vvNavToggle');
  const navLinks  = document.getElementById('vvNavLinks');
  navToggle.addEventListener('click', () => {
    const open = navLinks.classList.toggle('is-open');
    navToggle.setAttribute('aria-expanded', open);
    navToggle.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
  });

  /* ---------- video lightbox ---------- */
  const hero      = document.getElementById('vvHero');
  const lightbox  = document.getElementById('vvLightbox');
  const iframe    = document.getElementById('vvLightboxIframe');
  const closeBtn  = document.getElementById('vvLightboxClose');
  const bgVideo   = document.querySelector('.vv-hero__video iframe');
  const bgSrc     = bgVideo.src;
  let lastFocused = null;

  function openVideo(){
    lastFocused = document.activeElement;
    /* start the lightbox video from the beginning, with sound */
    iframe.src = "https://www.youtube.com/embed/" + YT_VIDEO_ID +
                 "?autoplay=1&rel=0&modestbranding=1";
    /* pause the background video while the lightbox is open,
       so two copies aren't playing at once */
    bgVideo.src = "";
    lightbox.classList.add('is-open');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeVideo(){
    lightbox.classList.remove('is-open');
    document.body.style.overflow = '';
    setTimeout(() => {
      iframe.src = "";        /* stops lightbox audio instantly   */
      bgVideo.src = bgSrc;    /* resume the muted background loop */
    }, 350);
    if(lastFocused) lastFocused.focus();
  }

  hero.addEventListener('click', (e) => {
    if (e.target.closest('[data-no-video], a, button')) return;
    openVideo();
  });

  hero.addEventListener('keydown', (e) => {
    if ((e.key === 'Enter' || e.key === ' ') && e.target === hero){
      e.preventDefault();
      openVideo();
    }
  });

  closeBtn.addEventListener('click', closeVideo);
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeVideo();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lightbox.classList.contains('is-open')) closeVideo();
  });
})();
</script>

</body>
</html>
