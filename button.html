<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vivace — Video Background Hero</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">

<style>
/* ============================================================
   VIVACE — NAV + YOUTUBE VIDEO BACKGROUND HERO + LIGHTBOX
   • The Riverside Ambience video plays muted as the hero bg
   • Clicking anywhere on the hero opens it full, with sound,
     in a floating lightbox
   ============================================================ */

:root{
  --vv-cream:  #FAF6EF;
  --vv-ivory:  #F6EFE4;
  --vv-espresso:#221A16;
  --vv-gold:   #C9A227;
  --vv-gold-soft:#E3C56B;
  --vv-terracotta:#C4714B;

  --vv-display:'Playfair Display', serif;
  --vv-body:'Jost', sans-serif;

  --vv-chat-scale:1.4;   /* size of the floating chat bubble */
}

*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{ background:var(--vv-cream); font-family:var(--vv-body); }
ul{ list-style:none; }
a{ text-decoration:none; }

/* ============================================================
   HEADER / NAVIGATION
   Sits on top of the hero. It's a sibling of the hero, so
   clicking it never triggers the video lightbox.
   ============================================================ */
.vv-header{
  position:absolute;
  top:0; left:0; right:0;
  z-index:50;
  background:linear-gradient(180deg, rgba(20,14,11,0.72), rgba(20,14,11,0.28) 80%, transparent);
}

/* --- top strip: welcome, socials, phone --- */
.vv-topbar{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  padding:10px 24px;
  font-size:0.8rem;
  font-weight:300;
  letter-spacing:0.08em;
  color:rgba(246,239,228,0.85);
  border-bottom:1px solid rgba(246,239,228,0.14);
}
.vv-topbar .sep{ opacity:0.4; }
.vv-topbar__social{
  display:flex;
  gap:14px;
}
.vv-topbar__social a{
  color:rgba(246,239,228,0.85);
  display:grid; place-items:center;
  transition:color .25s ease, transform .25s ease;
}
.vv-topbar__social a:hover{ color:var(--vv-gold-soft); transform:translateY(-1px); }
.vv-topbar__call{ color:rgba(246,239,228,0.85); }
.vv-topbar__call:hover{ color:var(--vv-gold-soft); }

/* --- main nav row --- */
.vv-nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
  padding:14px clamp(20px, 4vw, 48px);
  max-width:1360px;
  margin-inline:auto;
}

/* logo — swap this block for your <img> logo asset */
.vv-nav__logo{
  display:flex;
  flex-direction:column;
  line-height:1;
  color:var(--vv-ivory);
}
.vv-nav__logo .mark{
  font-family:var(--vv-display);
  font-style:italic;
  font-size:1.7rem;
  color:var(--vv-gold-soft);
}
.vv-nav__logo .name{
  font-family:var(--vv-body);
  font-weight:400;
  font-size:1.05rem;
  letter-spacing:0.42em;
  margin-top:4px;
}
.vv-nav__logo .tag{
  font-size:0.5rem;
  font-weight:300;
  letter-spacing:0.28em;
  color:var(--vv-gold-soft);
  margin-top:4px;
  text-transform:uppercase;
}

.vv-nav__links{
  display:flex;
  align-items:center;
  gap:clamp(16px, 2.4vw, 34px);
}
.vv-nav__links a{
  position:relative;
  font-weight:300;
  font-size:0.92rem;
  letter-spacing:0.04em;
  color:var(--vv-ivory);
  padding:6px 0;
  transition:color .25s ease;
}
.vv-nav__links a::after{
  content:"";
  position:absolute;
  left:0; bottom:0;
  width:0; height:1.5px;
  background:var(--vv-gold);
  transition:width .3s cubic-bezier(.2,.8,.2,1);
}
.vv-nav__links a:hover,
.vv-nav__links a.is-active{ color:var(--vv-gold-soft); }
.vv-nav__links a:hover::after,
.vv-nav__links a.is-active::after{ width:100%; }

.vv-nav__book{
  font-weight:400;
  font-size:0.9rem;
  letter-spacing:0.08em;
  color:var(--vv-gold-soft);
  border:1px solid var(--vv-gold);
  padding:12px 28px;
  background:rgba(20,14,11,0.35);
  transition:background .3s ease, color .3s ease, transform .3s ease;
}
.vv-nav__book:hover{
  background:var(--vv-gold);
  color:var(--vv-espresso);
  transform:translateY(-2px);
}

/* --- mobile menu --- */
.vv-nav__toggle{
  display:none;
  background:none;
  border:0;
  cursor:pointer;
  width:42px; height:42px;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.vv-nav__toggle span{
  width:24px; height:2px;
  background:var(--vv-ivory);
  transition:transform .3s ease, opacity .3s ease;
}
.vv-nav__toggle[aria-expanded="true"] span:nth-child(1){ transform:translateY(8px) rotate(45deg); }
.vv-nav__toggle[aria-expanded="true"] span:nth-child(2){ opacity:0; }
.vv-nav__toggle[aria-expanded="true"] span:nth-child(3){ transform:translateY(-8px) rotate(-45deg); }

@media (max-width: 960px){
  .vv-topbar{ font-size:0.72rem; gap:10px; flex-wrap:wrap; }
  .vv-nav__toggle{ display:flex; }
  .vv-nav__links{
    position:absolute;
    top:100%; left:0; right:0;
    flex-direction:column;
    align-items:stretch;
    gap:0;
    background:rgba(24,17,13,0.97);
    backdrop-filter:blur(8px);
    max-height:0;
    overflow:hidden;
    transition:max-height .4s cubic-bezier(.2,.8,.2,1);
  }
  .vv-nav__links.is-open{ max-height:70vh; }
  .vv-nav__links a{
    padding:16px 28px;
    border-bottom:1px solid rgba(246,239,228,0.08);
  }
  .vv-nav__links a::after{ display:none; }
  .vv-nav__book{ display:none; }
}

/* ============================================================
   HERO — YouTube video background
   ============================================================ */
.vv-hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  cursor:pointer;
  overflow:hidden;
  isolation:isolate;
}

/* poster image shows while the video loads / if it can't play */
.vv-hero__poster{
  position:absolute; inset:0;
  z-index:-3;
  background:
    url('https://images.unsplash.com/photo-1600334129128-685c5582fd35?q=80&w=1800&auto=format&fit=crop')
    center/cover no-repeat;             /* ← swap for a still from the video */
}

/* the video background itself.
   The iframe is oversized so a 16:9 video always covers the
   hero, whatever the screen shape (like object-fit: cover). */
.vv-hero__video{
  position:absolute; inset:0;
  z-index:-2;
  overflow:hidden;
  pointer-events:none;    /* clicks pass through to the hero */
}
.vv-hero__video iframe{
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%, -50%);
  width:max(100vw, 177.78vh);   /* 16/9 × height  */
  height:max(100vh, 56.25vw);   /* 9/16 × width   */
  border:0;
  pointer-events:none;
}

/* warm dark overlay for text legibility */
.vv-hero::before{
  content:"";
  position:absolute; inset:0;
  z-index:-1;
  background:linear-gradient(180deg,
    rgba(24,17,13,0.74) 0%,
    rgba(24,17,13,0.5) 45%,
    rgba(24,17,13,0.66) 100%);
}

.vv-hero__wave{
  position:absolute;
  left:0; right:0; bottom:-1px;
  width:100%;
  height:110px;
  pointer-events:none;
}

.vv-hero__content{
  position:relative;
  padding:170px 24px 180px;
  max-width:840px;
}

.vv-hero__title{
  font-family:var(--vv-display);
  font-weight:400;
  font-size:clamp(2.6rem, 6.5vw, 4.6rem);
  line-height:1.15;
  color:var(--vv-ivory);
  margin-bottom:22px;
  text-shadow:0 2px 24px rgba(0,0,0,0.4);
}

.vv-hero__sub{
  font-weight:300;
  font-size:clamp(1rem, 1.6vw, 1.15rem);
  color:rgba(246,239,228,0.92);
  margin-bottom:36px;
}

.vv-hero__actions{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:28px;
  flex-wrap:wrap;
}

.vv-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-weight:400;
  font-size:0.95rem;
  padding:14px 30px;
  border-radius:999px;
  transition:transform .3s ease, box-shadow .3s ease;
}
.vv-btn--solid{
  background:var(--vv-terracotta);
  color:#fff;
  box-shadow:0 10px 26px rgba(196,113,75,0.35);
}
.vv-btn--solid:hover{ transform:translateY(-2px); box-shadow:0 14px 32px rgba(196,113,75,0.45); }
.vv-btn--ghost{
  color:var(--vv-ivory);
  text-decoration:underline;
  text-underline-offset:6px;
}
.vv-btn:focus-visible{ outline:3px solid var(--vv-gold-soft); outline-offset:3px; }

/* pulsing "watch with sound" badge */
.vv-hero__watch{
  position:absolute;
  left:50%;
  bottom:135px;
  transform:translateX(-50%);
  display:inline-flex;
  align-items:center;
  gap:12px;
  font-size:0.8rem;
  font-weight:400;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--vv-ivory);
  pointer-events:none;
  white-space:nowrap;
}
.vv-hero__watch .play{
  width:50px; height:50px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:rgba(246,239,228,0.14);
  border:1px solid rgba(246,239,228,0.5);
  backdrop-filter:blur(4px);
  position:relative;
}
.vv-hero__watch .play::before{
  content:"";
  position:absolute; inset:0;
  border-radius:50%;
  border:1px solid rgba(246,239,228,0.45);
  animation:vv-pulse 2.4s ease-out infinite;
}
.vv-hero__watch .play svg{ margin-left:3px; }

@keyframes vv-pulse{
  0%   { transform:scale(1);   opacity:0.9; }
  100% { transform:scale(1.9); opacity:0; }
}

/* ============================================================
   FLOATING YOUTUBE LIGHTBOX (with sound)
   ============================================================ */
.vv-lightbox{
  position:fixed;
  inset:0;
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:rgba(15,10,8,0.88);
  backdrop-filter:blur(6px);
  opacity:0;
  visibility:hidden;
  transition:opacity .35s ease, visibility .35s ease;
}
.vv-lightbox.is-open{ opacity:1; visibility:visible; }

.vv-lightbox__frame{
  position:relative;
  width:min(1100px, 92vw);
  aspect-ratio:16/9;
  border-radius:18px;
  overflow:hidden;
  background:#000;
  box-shadow:0 40px 100px rgba(0,0,0,0.6);
  transform:scale(0.94) translateY(14px);
  transition:transform .4s cubic-bezier(.2,.8,.2,1);
}
.vv-lightbox.is-open .vv-lightbox__frame{ transform:scale(1) translateY(0); }
.vv-lightbox__frame iframe{
  position:absolute; inset:0;
  width:100%; height:100%;
  border:0;
}

.vv-lightbox__close{
  position:absolute;
  top:-18px; right:-18px;
  width:44px; height:44px;
  border-radius:50%;
  border:0;
  cursor:pointer;
  display:grid;
  place-items:center;
  background:var(--vv-gold);
  color:var(--vv-espresso);
  font-size:1.1rem;
  box-shadow:0 8px 22px rgba(0,0,0,0.4);
  transition:transform .25s ease, background .25s ease;
  z-index:2;
}
.vv-lightbox__close:hover{ transform:rotate(90deg); background:var(--vv-gold-soft); }
.vv-lightbox__close:focus-visible{ outline:3px solid var(--vv-ivory); outline-offset:2px; }

@media (max-width:640px){
  .vv-hero__watch{ bottom:115px; font-size:0.7rem; }
  .vv-lightbox__close{ top:10px; right:10px; }
}

@media (prefers-reduced-motion: reduce){
  .vv-lightbox, .vv-lightbox__frame, .vv-btn,
  .vv-lightbox__close, .vv-nav__links{ transition:none; }
  .vv-hero__watch .play::before{ animation:none; }
}

/* ============================================================
   VIVACE CHAT WIDGET
   • Frosted bubble with a travelling gold/white line
   • Opens a pure-glassmorphism panel (no colours of its own —
     it frosts whatever page content sits behind it)
   • Sits UNDER the video lightbox (z 1000) so it never blocks it
   ============================================================ */

/* ── Bubble ── */
.vivace-chat{
  position:fixed;
  bottom:32px;
  right:32px;
  width:48px;
  height:48px;
  border:none;
  background:none;
  cursor:pointer;
  z-index:900;
  transform:scale(var(--vv-chat-scale));
  transform-origin:bottom right;
  -webkit-tap-highlight-color:transparent;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.30));
  transition:filter .3s ease, opacity .25s ease, transform .3s cubic-bezier(.34,1.56,.64,1);
}
.vivace-chat.hidden{ opacity:0; pointer-events:none; transform:scale(calc(var(--vv-chat-scale) * .6)); }

.vivace-chat .frost{
  position:absolute; inset:0;
  clip-path:path("M14 6 h20 a8 8 0 0 1 8 8 v12 a8 8 0 0 1 -8 8 H23 l-8 8 v-8 h-1 a8 8 0 0 1 -8 -8 V14 a8 8 0 0 1 8 -8 z");
  background:linear-gradient(150deg, rgba(255,255,255,.35), rgba(255,255,255,.10) 55%, rgba(255,255,255,.20));
  -webkit-backdrop-filter:blur(12px) saturate(1.3);
          backdrop-filter:blur(12px) saturate(1.3);
}
.vivace-chat .frost::before{
  content:""; position:absolute; top:10%; left:16%; width:52%; height:30%; border-radius:50%;
  background:linear-gradient(180deg, rgba(255,255,255,.5), rgba(255,255,255,0));
}
.vivace-chat svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; }

.vivace-chat .line-base{ fill:none; stroke:url(#vivaceGoldWhite); stroke-width:2.4; stroke-linejoin:round; stroke-linecap:round; }
.vivace-chat .line-light,
.vivace-chat .line-glow{
  fill:none; stroke-width:2.4; stroke-linejoin:round; stroke-linecap:round;
  stroke-dasharray:16 84;
  animation:vivace-travel 3.2s linear infinite;
}
.vivace-chat .line-light{ stroke:#fff; }
.vivace-chat .line-light.gold{ stroke:var(--vv-gold); animation-delay:-1.6s; }
.vivace-chat .line-glow{ stroke:#fff; stroke-width:4.5; filter:blur(3px); opacity:.75; }
.vivace-chat .line-glow.gold{ stroke:var(--vv-gold); animation-delay:-1.6s; }
@keyframes vivace-travel{ from{stroke-dashoffset:0} to{stroke-dashoffset:-100} }

.vivace-chat:hover{ filter:drop-shadow(0 8px 18px rgba(0,0,0,.34)) drop-shadow(0 0 10px rgba(201,162,39,.35)); }
.vivace-chat:hover .line-light,
.vivace-chat:hover .line-glow{ animation-duration:1.6s; }
.vivace-chat:focus-visible{ outline:none; filter:drop-shadow(0 0 10px rgba(201,162,39,.6)); }

/* ── Glass panel — neutral, no own colours ── */
.vivace-panel{
  position:fixed;
  bottom:32px;
  right:32px;
  width:min(370px, calc(100vw - 32px));
  height:min(560px, calc(100dvh - 64px));
  z-index:950;
  border-radius:26px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  background:linear-gradient(160deg, rgba(255,255,255,.28), rgba(255,255,255,.10) 45%, rgba(255,255,255,.18));
  -webkit-backdrop-filter:blur(26px) saturate(1.4);
          backdrop-filter:blur(26px) saturate(1.4);
  border:1px solid rgba(255,255,255,.45);
  box-shadow:
    0 24px 60px rgba(0,0,0,.22),
    inset 0 1px 1px rgba(255,255,255,.55);
  opacity:0;
  pointer-events:none;
  transform:translateY(24px) scale(.94);
  transform-origin:bottom right;
  transition:opacity .35s ease, transform .38s cubic-bezier(.34,1.4,.64,1);
}
.vivace-panel.open{ opacity:1; pointer-events:auto; transform:translateY(0) scale(1); }

.vivace-panel header{
  position:relative; z-index:1;
  display:flex; align-items:center; gap:12px;
  padding:16px 18px;
  border-bottom:1px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.14);
}
.vivace-panel .v-mark{
  width:38px; height:38px; border-radius:50%;
  display:grid; place-items:center;
  background:rgba(255,255,255,.22);
  border:1px solid rgba(255,255,255,.5);
  -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  color:var(--vv-espresso);
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:22px; line-height:1;
  box-shadow:0 2px 8px rgba(0,0,0,.12), inset 0 1px 1px rgba(255,255,255,.6);
}
.vivace-panel .head-txt strong{
  display:block; color:var(--vv-espresso); font-weight:600; font-size:15px; letter-spacing:.02em;
}
.vivace-panel .head-txt span{
  display:flex; align-items:center; gap:6px;
  color:var(--vv-espresso); opacity:.65; font-size:12px;
}
.vivace-panel .dot{ width:7px; height:7px; border-radius:50%; background:#5BAE6E; box-shadow:0 0 6px #5BAE6E; }
.vivace-panel .close-btn{
  margin-left:auto; width:32px; height:32px; border-radius:50%; border:1px solid rgba(255,255,255,.5);
  background:rgba(255,255,255,.30); color:var(--vv-espresso); cursor:pointer; font-size:16px; line-height:1;
  display:grid; place-items:center;
  transition:background .2s ease, transform .2s ease;
}
.vivace-panel .close-btn:hover{ background:rgba(255,255,255,.55); transform:rotate(90deg); }

.vivace-panel .stream{
  position:relative; z-index:1;
  flex:1; overflow-y:auto;
  padding:18px 16px;
  display:flex; flex-direction:column; gap:12px;
  scrollbar-width:thin;
  scrollbar-color:rgba(34,26,22,.30) transparent;
}

.msg{
  max-width:88%;
  padding:12px 15px;
  border-radius:16px 16px 16px 5px;
  background:rgba(255,255,255,.22);
  -webkit-backdrop-filter:blur(8px);
          backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.45);
  color:var(--vv-espresso);
  font-size:14px; line-height:1.55;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
  opacity:0; transform:translateY(10px);
  animation:msg-in .4s ease forwards;
}
.msg.user{
  align-self:flex-end;
  border-radius:16px 16px 5px 16px;
  background:rgba(255,255,255,.38);
  border-color:rgba(255,255,255,.6);
}
@keyframes msg-in{ to{opacity:1; transform:translateY(0)} }

.msg .greet{
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:17px; color:var(--vv-espresso);
}
.msg ul{ list-style:none; margin-top:8px; display:flex; flex-direction:column; gap:5px; }
.msg ul li{ display:flex; gap:8px; align-items:baseline; }
.msg ul li::before{ content:"•"; color:rgba(34,26,22,.6); font-weight:600; }

.typing{
  align-self:flex-start; display:inline-flex; gap:5px;
  padding:12px 16px; border-radius:16px 16px 16px 5px;
  background:rgba(255,255,255,.22); border:1px solid rgba(255,255,255,.45);
}
.typing i{
  width:7px; height:7px; border-radius:50%; background:rgba(34,26,22,.55);
  animation:blink 1.1s ease-in-out infinite;
}
.typing i:nth-child(2){ animation-delay:.18s; }
.typing i:nth-child(3){ animation-delay:.36s; }
@keyframes blink{ 0%,70%,100%{opacity:.25; transform:translateY(0)} 35%{opacity:1; transform:translateY(-3px)} }

.cta-start,
.chip{
  position:relative; z-index:1;
  border:1px solid rgba(255,255,255,.55);
  background:rgba(255,255,255,.26);
  -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
  color:var(--vv-espresso);
  font-family:var(--vv-body); font-weight:500; font-size:14px;
  border-radius:14px;
  padding:12px 16px;
  cursor:pointer;
  text-align:left;
  box-shadow:0 4px 14px rgba(0,0,0,.10), inset 0 1px 1px rgba(255,255,255,.55);
  transition:transform .22s ease, box-shadow .22s ease, background .22s ease;
  opacity:0; transform:translateY(10px);
  animation:msg-in .4s ease forwards;
}
.cta-start{ align-self:center; font-weight:600; letter-spacing:.03em; padding:12px 26px; border-radius:999px; }
.cta-start:hover, .chip:hover{
  transform:translateY(-2px);
  background:rgba(255,255,255,.42);
  box-shadow:0 8px 20px rgba(0,0,0,.14), inset 0 1px 1px rgba(255,255,255,.7);
}
.chip small{ display:block; font-weight:400; font-size:12px; opacity:.7; margin-top:2px; }
.chips{ display:flex; flex-direction:column; gap:8px; max-width:88%; }

.email-row{
  display:flex; gap:8px; max-width:88%;
  opacity:0; transform:translateY(10px); animation:msg-in .4s ease forwards;
}
.email-row input{
  flex:1; min-width:0;
  padding:11px 14px; border-radius:12px;
  border:1px solid rgba(255,255,255,.55);
  background:rgba(255,255,255,.30);
  font-family:var(--vv-body); font-size:14px; color:var(--vv-espresso);
  outline:none;
}
.email-row input::placeholder{ color:rgba(34,26,22,.45); }

<script>
(function(){
  const YT_VIDEO_ID = "_YWYNuqIxbw";

  /* ---------- mobile nav ---------- */
  const navToggle = document.getElementById('vvNavToggle');
  const navLinks  = document.getElementById('vvNavLinks');
  navToggle.addEventListener('click', () => {
    const open = navLinks.classList.toggle('is-open');
    navToggle.setAttribute('aria-expanded', open);
    navToggle.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
  });

  /* ---------- video lightbox ---------- */
  const hero      = document.getElementById('vvHero');
  const lightbox  = document.getElementById('vvLightbox');
  const iframe    = document.getElementById('vvLightboxIframe');
  const closeBtn  = document.getElementById('vvLightboxClose');
  const bgVideo   = document.querySelector('.vv-hero__video iframe');
  const bgSrc     = bgVideo.src;
  let lastFocused = null;

  function openVideo(){
    lastFocused = document.activeElement;
    /* start the lightbox video from the beginning, with sound */
    iframe.src = "https://www.youtube.com/embed/" + YT_VIDEO_ID +
                 "?autoplay=1&rel=0&modestbranding=1";
    /* pause the background video while the lightbox is open,
       so two copies aren't playing at once */
    bgVideo.src = "";
    lightbox.classList.add('is-open');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeVideo(){
    lightbox.classList.remove('is-open');
    document.body.style.overflow = '';
    setTimeout(() => {
      iframe.src = "";        /* stops lightbox audio instantly   */
      bgVideo.src = bgSrc;    /* resume the muted background loop */
    }, 350);
    if(lastFocused) lastFocused.focus();
  }

  hero.addEventListener('click', (e) => {
    if (e.target.closest('[data-no-video], a, button')) return;
    openVideo();
  });

  hero.addEventListener('keydown', (e) => {
    if ((e.key === 'Enter' || e.key === ' ') && e.target === hero){
      e.preventDefault();
      openVideo();
    }
  });

  closeBtn.addEventListener('click', closeVideo);
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeVideo();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lightbox.classList.contains('is-open')) closeVideo();
  });
})();

/* ============================================================
   VIVACE CHAT WIDGET
   ============================================================ */
(function(){
  /* ── CONFIG — matches this site's routes ── */
  const VV = {
    contactFormUrl : "/contact#form",       // Book a consultation → contact page form section
    servicesUrl    : "/treatments",         // Explore our services → treatments page
    helpDeskTel    : "tel:+254116766666",   // Talk to our help desk → dial pad, number pre-filled
    typingDelay    : 900
  };

  const bubble = document.getElementById("vvChatBubble");
  const panel  = document.getElementById("vvChatPanel");
  const stream = document.getElementById("vvChatStream");
  const close  = document.getElementById("vvChatClose");
  let booted = false;

  const scrollEnd = () => stream.scrollTo({top: stream.scrollHeight, behavior:"smooth"});

  function typingDots(){
    const t = document.createElement("div");
    t.className = "typing";
    t.innerHTML = "<i></i><i></i><i></i>";
    stream.appendChild(t);
    scrollEnd();
    return t;
  }

  function botMsg(html, delay = VV.typingDelay){
    return new Promise(res => {
      const t = typingDots();
      setTimeout(() => {
        t.remove();
        const m = document.createElement("div");
        m.className = "msg";
        m.innerHTML = html;
        stream.appendChild(m);
        scrollEnd();
        res(m);
      }, delay);
    });
  }

  function userMsg(text){
    const m = document.createElement("div");
    m.className = "msg user";
    m.textContent = text;
    stream.appendChild(m);
    scrollEnd();
  }

  /* ── Text message 1 ── */
  async function boot(){
    await botMsg(
      `<span class="greet">Welcome to Vivace.</span><br>
       I am your virtual assistant. You can access the following:
       <ul>
         <li>Book a consultation</li>
         <li>Talk to our help desk</li>
         <li>Explore our services</li>
         <li>Subscribe to our updates</li>
       </ul>
       Tap the button below to get started.`
    );
    const start = document.createElement("button");
    start.className = "cta-start";
    start.textContent = "Get started";
    start.addEventListener("click", () => {
      start.remove();
      userMsg("Get started");
      showOptions();
    }, {once:true});
    stream.appendChild(start);
    scrollEnd();
  }

  /* ── Text message 2 + clickable options ── */
  async function showOptions(){
    await botMsg("Select an option here:");
    const wrap = document.createElement("div");
    wrap.className = "chips";

    const options = [
      { label:"Book a consultation",     sub:"For any branch booking",
        act(){ go(VV.contactFormUrl); } },
      { label:"Explore our services",    sub:"See which treatment suits you",
        act(){ go(VV.servicesUrl); } },
      { label:"Subscribe to our updates",sub:"Get premium updates on offers",
        act(){ askEmail(); } },
      { label:"Talk to our help desk",   sub:"Call our customer services for assistance",
        act(){ window.location.href = VV.helpDeskTel; } }
    ];

    options.forEach((o,i) => {
      const c = document.createElement("button");
      c.className = "chip";
      c.style.animationDelay = (i * 90) + "ms";
      c.innerHTML = `${o.label}<small>${o.sub}</small>`;
      c.addEventListener("click", () => { userMsg(o.label); o.act(); });
      wrap.appendChild(c);
    });

    stream.appendChild(wrap);
    scrollEnd();
  }

  function go(url){
    botMsg("Taking you there now\u2026", 500).then(() => {
      setTimeout(() => { window.location.href = url; }, 600);
    });
  }

  /* ── Subscribe: inline email capture ── */
  async function askEmail(){
    await botMsg("Lovely! Please enter your email address below and we\u2019ll keep you posted on offers and updates.");
    const row = document.createElement("div");
    row.className = "email-row";
    row.innerHTML = `
      <input type="email" placeholder="you@example.com" aria-label="Email address" autocomplete="email">
      <button type="button">Subscribe</button>`;
    const input = row.querySelector("input");
    const btn   = row.querySelector("button");

    const submit = () => {
      const v = input.value.trim();
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)){
        input.style.borderColor = "#c0392b";
        input.focus();
        return;
      }
      userMsg(v);
      row.remove();
      /* TODO: send `v` to your mailing endpoint, e.g.
         fetch('/subscribe.php', {method:'POST', body:new URLSearchParams({email:v})}) */
      botMsg("You\u2019re on the list! \u2728 Watch your inbox for exclusive Vivace offers and updates.");
    };
    btn.addEventListener("click", submit);
    input.addEventListener("keydown", e => { if(e.key === "Enter") submit(); });

    stream.appendChild(row);
    scrollEnd();
    input.focus();
  }

  /* ── Open / close ── */
  function openPanel(){
    panel.classList.add("open");
    panel.setAttribute("aria-hidden","false");
    bubble.classList.add("hidden");
    bubble.setAttribute("aria-expanded","true");
    if(!booted){ booted = true; boot(); }
  }
  function closePanel(){
    panel.classList.remove("open");
    panel.setAttribute("aria-hidden","true");
    bubble.classList.remove("hidden");
    bubble.setAttribute("aria-expanded","false");
  }

  bubble.addEventListener("click", openPanel);
  close.addEventListener("click", closePanel);
  document.addEventListener("keydown", e => {
    if(e.key === "Escape" && panel.classList.contains("open") &&
       !document.getElementById("vvLightbox").classList.contains("is-open")){
      closePanel();
    }
  });
})();
</script>
